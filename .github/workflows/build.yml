name: Build Chess Engine

on:
  push:
    branches:
      - "*"

jobs:
  Linting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Run clang-format check
        run: |
          make format
          git diff --exit-code

      - name: Run clang-tidy check
        run:
          make tidy

  Build-Windows:
    runs-on: windows-2025

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Create Makefiles
        run: |
          cmake -DASAN=OFF -DRELEASE=ON -G "MinGW Makefiles" -B build

      - name: Build Chess Engine
        run: cmake --build build

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: chess_engine_executables
          path: |
            build/chess_engine_cli
            build/chess_engine_uci

  Build-Ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Build Chess Engine
        run: make build-release

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: chess_engine_executables_ubuntu
          path: |
            build/chess_engine_cli
            build/chess_engine_uci
